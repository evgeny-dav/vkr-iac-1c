name: Deploy 1C Cluster

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/yc_key
          chmod 600 ~/.ssh/yc_key

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
        env:
          TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_SECRET_KEY }}

      - name: Wait for servers
        run: sleep 60

      - name: Run Ansible
        run: ansible-playbook -i inventory.ini site.yml
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
