name: Deploy 1C Cluster

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug paths
        run: |
          echo "Current dir: $(pwd)"
          echo "Local tfstate exists:"
          ls -la /root/VKR_IaC_1C/terraform/terraform.tfstate
          echo "Work dir tfstate:"
          ls -la terraform/terraform.tfstate 2>/dev/null || echo "NOT FOUND"

      - name: Force copy tfstate
        run: cp -f /root/VKR_IaC_1C/terraform/terraform.tfstate terraform/terraform.tfstate

      - name: Verify tfstate copied
        run: cat terraform/terraform.tfstate | grep -o '"name":"iac-1c-[^"]*"'

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
        env:
          TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}

      - name: Wait for servers
        run: sleep 60

      - name: Run Ansible
        run: ansible-playbook -i inventory.ini site.yml
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
